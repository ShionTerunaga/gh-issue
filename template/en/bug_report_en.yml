name: Bug report
description: |
  Create an Issue to report a bug. Include reproduction steps, expected behavior,
  actual behavior, and your environment in as much detail as possible.
title: "[BUG] "
labels: [bug]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in the sections below with as much detail as possible. More information makes it easier to reproduce and fix the issue.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: |
        Write a concise one-line summary of the bug.
      placeholder: |
        Example: "Build fails with TypeError in createApp"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: |
        Write the exact steps needed to reproduce the bug.
      placeholder: |
        1. Clone the repository
        2. Run `pnpm install`
        3. Run `pnpm run build`
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: |
        Describe what you expected to happen.
      placeholder: |
        Example: "The project builds successfully"
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: |
        Describe what actually happened. Include error messages or stack traces if available.
      placeholder: |
        Paste error output or stack traces here.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: |
        Include relevant environment details such as OS, Node.js version, and pnpm version.
      placeholder: |
        Example: "macOS 14.0, Node 20.10.0, pnpm 8.0.0"
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: |
        Add anything else that may help, such as logs, screenshots, or links to failing CI runs.
