pre-commit:
    piped: true
    commands:
        build:
            priority: 1
            run: pnpm build
        lint:
            priority: 2
            run: pnpm lint
        format:
            priority: 3
            run: pnpm format

post-merge:
    commands:
        install:
            run: pnpm install

commit-msg:
    commands:
        commitlint:
            run: npx commitlint --edit $1
