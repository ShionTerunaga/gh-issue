name: Create GitHub Release

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: create-github-release
  cancel-in-progress: true

jobs:
  github-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build project release metadata from changelogs
        id: releases
        run: node --experimental-strip-types ./scripts/release-notes/extract-release-notes.ts "${{ github.event.before }}" "${{ github.sha }}"

      - name: Create or update GitHub Releases
        if: steps.releases.outputs.has_releases == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANIFEST_PATH: ${{ steps.releases.outputs.manifest_path }}
        run: node --experimental-strip-types ./scripts/release-notes/create-github-release.ts
