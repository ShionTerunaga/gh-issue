name: Sync Release Branch

on:
  pull_request_target:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: sync-release-branch
  cancel-in-progress: true

jobs:
  sync-release:
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'changeset-release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main

      - name: Capture release branch range
        id: release-range
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin release || true
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"

          if git rev-parse --verify origin/release >/dev/null 2>&1; then
            echo "before_sha=$(git rev-parse origin/release)" >> "$GITHUB_OUTPUT"
          else
            echo "before_sha=0000000000000000000000000000000000000000" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Build CLI
        run: pnpm build

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare release branch contents
        run: |
          cp ./scripts/release-notes/create-release-from-changelog.ts "$RUNNER_TEMP/create-release-from-changelog.ts"
          release_dir="$RUNNER_TEMP/release-branch"
          rm -rf "$release_dir"
          mkdir -p "$release_dir"

          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";

          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          const runtimeDependencies = Object.fromEntries(
            Object.entries(pkg.dependencies ?? {}).filter(([name]) =>
              ["commander", "fast-glob", "prompts", "ts-shared"].includes(name),
            ),
          );

          const releasePackage = {
            name: pkg.name,
            version: pkg.version,
            description: pkg.description,
            homepage: pkg.homepage,
            bugs: pkg.bugs,
            license: pkg.license,
            repository: pkg.repository,
            bin: pkg.bin,
            files: ["dist", "LICENSE"],
            type: pkg.type,
            main: pkg.main,
            exports: pkg.exports,
            publishConfig: pkg.publishConfig,
            dependencies: runtimeDependencies,
            engines: pkg.engines,
          };

          writeFileSync("package.json", `${JSON.stringify(releasePackage, null, 2)}\n`);
          NODE

          cp -R dist "$release_dir/dist"
          cp CHANGELOG.md LICENSE package.json "$release_dir/"

          git rm -r -f --ignore-unmatch .
          cp -R "$release_dir"/. .

      - name: Sync release branch
        id: sync-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add -A
          git add -f dist CHANGELOG.md LICENSE package.json

          if git diff --cached --quiet; then
            echo "No release branch changes."
          else
            git commit -m "chore: sync release branch"
          fi

          cleanup_remote() {
            git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
          }

          trap cleanup_remote EXIT
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:refs/heads/release --force
          echo "after_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ steps.sync-release.outputs.after_sha }}
        run: node --experimental-strip-types "$RUNNER_TEMP/create-release-from-changelog.ts"
