name: 機能要望
description: |
  新しい機能や改善案を提案するための issue を作成します。背景、ユースケース、
  代替案などを記載してください。
title: "[FEATURE] "
labels: [enhancement]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        改善提案ありがとうございます。解決したい課題と、その機能がどのように役立つかを記載してください。
  - type: input
    id: summary
    attributes:
      label: 概要
      description: 要望する機能を一文で簡潔に書いてください。
      placeholder: |
        例: "プロンプトをスキップする CLI オプションを追加したい"
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 背景・ユーザーストーリー
      description: どんな課題があり、なぜこの機能が必要なのかを書いてください。
      placeholder: |
        ユーザーとして、CI で利用するために対話なしでジェネレーターを実行したい。
  - type: textarea
    id: proposed
    attributes:
      label: 提案する解決策
      description: 実装案や API の変更案があれば記載してください。
      placeholder: |
        例: "`-n/--name` と `-f/--framework` オプションを CLI に追加する"
  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: ほかに検討した方法があれば簡単に書いてください。
  - type: input
    id: impact
    attributes:
      label: 影響範囲
      description: 後方互換性、テスト、テンプレートなど、影響しそうな箇所を書いてください。
      placeholder: |
        例: "後方互換性あり。オプション追加のみ"
  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: 関連リンク、モックアップ、そのほか補足があれば記載してください。
