name: 機能要望
description: |
    新機能や改善案を提案するための Issue を作成します。背景、ユースケース、
    代替案があれば記載してください。
title: "[FEATURE] "
labels: [enhancement]
assignees: []

body:
    - type: markdown
      attributes:
          value: |
              改善案の提案ありがとうございます。解決したい課題と、その機能がどのように役立つかを教えてください。
    - type: input
      id: summary
      attributes:
          label: 概要
          description: 要望する機能を 1 行で簡潔に書いてください。
          placeholder: |
              例: "プロンプトをスキップする CLI オプションを追加したい"
      validations:
          required: true
    - type: textarea
      id: motivation
      attributes:
          label: 背景とユーザーストーリー
          description: どんな課題があり、なぜこの機能が必要なのかを書いてください。
          placeholder: |
              ユーザーとして、対話なしでジェネレーターを実行できるようにしたいです。
              そうすることで CI から利用しやすくなります。
    - type: textarea
      id: proposed
      attributes:
          label: 提案する解決策
          description: 想定している実装や API 変更があれば書いてください。
          placeholder: |
              例: "CLI に -n/--name と -f/--framework オプションを追加する"
    - type: textarea
      id: alternatives
      attributes:
          label: 検討した代替案
          description: ほかに検討した方法があれば簡単に書いてください。
    - type: input
      id: impact
      attributes:
          label: 想定される影響範囲
          description: 後方互換性、テスト、テンプレートへの影響など、関係しそうな点を書いてください。
          placeholder: |
              例: "後方互換あり。オプション追加のみ"
    - type: textarea
      id: additional
      attributes:
          label: 補足情報
          description: 関連リンク、モック、補足メモなどがあれば記載してください。
